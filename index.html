<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Art Market</title>
    <style>
        :root { --primary: #4A90E2; --success: #28a745; --danger: #dc3545; --bg: #f4f6f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        .watermark { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: bold; }

        /* Navigatsiya */
        .navigation { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        .nav-btn { flex: 1; background: none; border: none; padding: 12px; font-size: 15px; font-weight: 600; color: #777; cursor: pointer; transition: all 0.3s; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Market Ko'rinishi */
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border: 1px solid #e1e8ed; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; box-sizing: border-box; }
        .card img { width: 100%; height: 130px; object-fit: cover; border-radius: 8px; }
        .card-title { font-size: 14px; font-weight: bold; margin: 8px 0 4px 0; height: 38px; overflow: hidden; }
        .card-desc { font-size: 12px; color: #666; height: 32px; overflow: hidden; margin-bottom: 8px; }
        .buy-action { background: var(--success); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 13px; }

        /* Artist Form va Obuna */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; }
        input[type="text"], input[type="file"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 120px; resize: none; }
        .counter-label { font-size: 11px; color: #666; text-align: right; margin-top: 4px; }
        
        .main-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .main-btn:hover { opacity: 0.9; }

        .sub-alert { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 16px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .error-banner { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 6px; margin-top: 8px; font-size: 12px; display: none; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>VTuber Art Market</h1>
        <div class="watermark">VTuber Art Market Official</div>
    </div>

    <div class="navigation">
        <button class="nav-btn active" onclick="navigate('market')">Market </button>
        <button class="nav-btn" onclick="navigate('panel')">Artist Panel 🎨 </button>
    </div>

    <div id="market-view" class="view-section active">
        <div id="products-container" class="products-grid"></div>
    </div>

    <div id="panel-view" class="view-section">
        <div id="subscription-gate" class="sub-alert" style="display: none;">
            🔒 <strong>Subscription Access Required!</strong><br>
            Your Telegram ID is not in the Promo Whitelist. Please subscribe to gain permission to upload digital items.
            <button class="main-btn" style="margin-top: 12px; background: #ffc107; color: #222;">Purchase Access</button>
        </div>

        <form id="upload-form">
            <div class="form-group">
                <label>Asset Title</label>
                <input type="text" id="asset-title" placeholder="e.g., Cute Neko Rigged Model" required>
            </div>

            <div class="form-group">
                <label>Upload Preview Image Link (URL)</label>
                <input type="text" id="asset-image" placeholder="https://example.com/preview.jpg" required>
            </div>

            <div class="form-group">
                <label>About Product (Max 2000 chars, Emojis ✅)</label>
                <textarea id="asset-about" maxlength="2000" placeholder="Describe asset features... No contact details allowed!" required></textarea>
                <div class="counter-label"><span id="char-now">0</span> / 2000</div>
                <div id="security-error" class="error-banner"></div>
            </div>

            <button type="submit" class="main-btn">Publish to Market</button>
        </form>
    </div>
</div>

<script>
    // Telegram foydalanuvchi IDsi
    const CURRENT_TELEGRAM_USER_ID = 678335943; 
    
    // TO'G'RILANDI: Havola toza holatga keltirildi va oxiridagi xato belgi o'chirildi!
    const BACKEND_URL = "https://vtuber-art-market-backend-w4oa.onrender.com";

    // Navigatsiya
    function navigate(view) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        if(view === 'market') {
            document.getElementById('market-view').classList.add('active');
            document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
            loadProducts();
        } else {
            document.getElementById('panel-view').classList.add('active');
            document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
            checkUserAccess();
        }
    }

    // Marketga mahsulotlarni yuklash
    async function loadProducts() {
        const container = document.getElementById('products-container');
        try {
            const res = await fetch(BACKEND_URL + '/api/products');
            const products = await res.json();
            if (products.length === 0) {
                container.innerHTML = "<p style='grid-column: span 2; text-align:center; color:#888;'>No products available in the market yet.</p>";
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.image}" alt="Product" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.description}</div>
                    <button class="buy-action" onclick="alert('Downloading items...')">Buy Assets</button>
                </div>
            `).join('');
        } catch (err) {
            container.innerHTML = "<p style='grid-column: span 2; text-align:center; color:red;'>Failed to connect to backend server.</p>";
        }
    }

    // Obuna holatini tekshirish
    async function checkUserAccess() {
        const gate = document.getElementById('subscription-gate');
        const form = document.getElementById('upload-form');
        try {
            // TO'G'RILANDI: userId xatosi CURRENT_TELEGRAM_USER_ID ga almashtirildi
            const res = await fetch(BACKEND_URL + '/api/check-user/' + CURRENT_TELEGRAM_USER_ID);
            const data = await res.json();
            if(data.promo_active) {
                gate.style.display = 'none';
                form.style.display = 'block';
            } else {
                gate.style.display = 'block';
                form.style.display = 'none';
            }
        } catch(e) {
            gate.style.display = 'block';
            form.style.display = 'none';
        }
    }

    // Belgilar hisoblagichi
    const textarea = document.getElementById('asset-about');
    textarea.addEventListener('input', () => {
        document.getElementById('char-now').textContent = textarea.value.length;
        document.getElementById('security-error').style.display = 'none';
    });

    // Formani serverga yuborish
    document.getElementById('upload-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorBanner = document.getElementById('security-error');
        
        const payload = {
            user_id: CURRENT_TELEGRAM_USER_ID,
            title: document.getElementById('asset-title').value,
            image: document.getElementById('asset-image').value,
            about: textarea.value
        };

        try {
            const res = await fetch(BACKEND_URL + '/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if(!res.ok) {
                errorBanner.textContent = data.error;
                errorBanner.style.display = 'block';
            } else {
                alert(data.message);
                document.getElementById('upload-form').reset();
                navigate('market');
            }
        } catch(err) {
            errorBanner.textContent = "Server connection lost!";
            errorBanner.style.display = 'block';
        }
    });

    // Ilk yuklanganda marketni ochish
    loadProducts();
</script>
</body>
                    </html>
